<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acesso negado &middot; SAD BH</title>
<script src="config.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#f4f6f9;color:#1b2438;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border:1px solid #e4e8ef;border-radius:14px;padding:40px;width:100%;max-width:420px;text-align:center}
.icon{width:64px;height:64px;background:#fdecea;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;border:2px solid #f5b8b2}
.title{font-size:20px;font-weight:700;color:#c0392b;margin-bottom:8px}
.sub{font-size:13px;color:#6b7a96;line-height:1.6;margin-bottom:20px}
.email{font-size:12px;color:#a0abbe;background:#f4f6f9;border:1px solid #e4e8ef;border-radius:8px;padding:8px 16px;display:inline-block;margin-bottom:24px}
.btn{background:#2e7d4f;border:none;border-radius:8px;padding:10px 24px;font-size:13px;color:#fff;cursor:pointer;font-family:inherit;font-weight:600;text-decoration:none;display:inline-block}
</style>
</head>
<body>
<div class="card">
  <div class="icon">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
      <circle cx="12" cy="12" r="10" stroke="#c0392b" stroke-width="1.8"/>
      <path d="M15 9L9 15M9 9l6 6" stroke="#c0392b" stroke-width="1.8" stroke-linecap="round"/>
    </svg>
  </div>
  <div class="title">Acesso n&atilde;o autorizado</div>
  <div class="sub">Seu e-mail n&atilde;o est&aacute; na lista de usu&aacute;rios permitidos.<br>Entre em contato com o gestor do SAD BH.</div>
  <div class="email" id="email-display">verificando...</div>
  <br>
  <div style="font-size:12px;color:#a0abbe">Cobertura de Escalas &middot; SAD BH</div>
</div>
<script>
apiGet({ acao: 'meu_acesso' }).then(r => {
  if (r && r.email) document.getElementById('email-display').textContent = r.email;
  else document.getElementById('email-display').textContent = 'e-mail n&atilde;o identificado';
}).catch(() => {
  document.getElementById('email-display').textContent = 'e-mail n&atilde;o identificado';
});
</script>
</body>
</html>
