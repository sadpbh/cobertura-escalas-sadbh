<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cobertura de Escalas &middot; SAD BH</title>
<script src="config.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#f4f6f9;color:#1b2438;min-height:100vh;display:flex;align-items:center;justify-content:center}
.loader{text-align:center;padding:40px}
.logo-icon{width:64px;height:64px;background:#2e7d4f;border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px}
.title{font-size:20px;font-weight:700;margin-bottom:6px}
.sub{font-size:13px;color:#6b7a96;margin-bottom:24px}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#2e7d4f;animation:pulse 1.2s ease-in-out infinite;margin:0 3px}
.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,80%,100%{opacity:.2}40%{opacity:1}}
.erro{background:#fdecea;border:1px solid #f5b8b2;border-radius:10px;padding:16px 20px;color:#c0392b;font-size:13px;margin-top:16px;max-width:360px}
</style>
</head>
<body>
<div class="loader">
  <div class="logo-icon">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
      <rect x="3" y="4" width="18" height="16" rx="2" stroke="#fff" stroke-width="1.8"/>
      <path d="M3 9h18" stroke="#fff" stroke-width="1.8"/>
      <path d="M8 2v4M16 2v4" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M7 14h4M7 17h6" stroke="rgba(255,255,255,.6)" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
  </div>
  <div class="title">Cobertura de Escalas</div>
  <div class="sub">SAD BH &middot; Verificando acesso...</div>
  <div><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
  <div id="erro"></div>
</div>
<script>
async function iniciar() {
  try {
    const r = await apiGet({ acao: 'meu_acesso' });
    if (r && r.ok) {
      window.location.href = 'painel.html';
    } else {
      window.location.href = 'acesso_negado.html';
    }
  } catch(e) {
    document.getElementById('erro').innerHTML = `
      <div class="erro">
        Erro ao conectar com o servidor.<br>
        <small>${e.message}</small><br><br>
        <a href="painel.html" style="color:#2e7d4f;font-weight:500">Tentar acessar o painel diretamente &rarr;</a>
      </div>`;
  }
}
iniciar();
</script>
</body>
</html>
